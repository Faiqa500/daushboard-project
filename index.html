<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="vv.css">

    <!-- Alpine (deferred) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.2/dist/cdn.min.js"></script>
</head>

<body>

    <!-- Page root: Alpine dashboard component (sidebar + language) -->
    <section x-data="dashboard" x-cloak>

        <!-- SIDEBAR -->
        <aside :class="open ? 'asidebar' : 'asidebar inactive'">

            <div class="d-flex justify-content-between justify-content-lg-center align-items-center">
                <h4 class="fw-bold text-primary" x-text="t('sidebarTitle')"></h4>
                <i @click="open = false" class="bi bi-x fs-1 d-lg-none"></i>
            </div>

            <div class="mt-4">
                <ul class="list-unstyled">

                    <!-- Dashboard -->
                    <li class="sidebarItem active mt-3">
                        <a href="#" class="sidebarlink">
                            <i class="bi bi-grid-fill me-2"></i>
                            <span x-text="t('nav.dashboard')"></span>
                        </a>
                    </li>

                    <!-- Shop -->
                    <li x-data="{ openMenu: false }" class="sidebarItem mt-3">
                        <a @click.prevent="openMenu = !openMenu" href="#" class="sidebarlink">
                            <i class="bi bi-shop me-2"></i>
                            <span x-text="t('nav.shop')"></span>
                            <i class="ms-auto bi bi-chevron-down"></i>
                        </a>
                        <ul x-show="openMenu" x-transition class="submenu">
                            <template x-for="(item, i) in t('submenu')" :key="i">
                                <li class="submenu-item"><a href="#" x-text="item"></a></li>
                            </template>
                        </ul>
                    </li>

                    <!-- Products -->
                    <li x-data="{ openMenu: false }" class="sidebarItem mt-3">
                        <a @click.prevent="openMenu = !openMenu" href="#" class="sidebarlink">
                            <i class="bi bi-box-seam me-2"></i>
                            <span x-text="t('nav.products')"></span>
                            <i class="ms-auto bi bi-chevron-down"></i>
                        </a>
                        <ul x-show="openMenu" x-transition class="submenu">
                            <template x-for="(item, i) in t('submenu')" :key="i">
                                <li class="submenu-item"><a href="#" x-text="item"></a></li>
                            </template>
                        </ul>
                    </li>

                    <!-- Orders -->
                    <li x-data="{ openMenu: false }" class="sidebarItem mt-3">
                        <a @click.prevent="openMenu = !openMenu" href="#" class="sidebarlink">
                            <i class="bi bi-bag me-2"></i>
                            <span x-text="t('nav.orders')"></span>
                            <i class="ms-auto bi bi-chevron-down"></i>
                        </a>
                        <ul x-show="openMenu" x-transition class="submenu">
                            <template x-for="(item, i) in t('submenu')" :key="i">
                                <li class="submenu-item"><a href="#" x-text="item"></a></li>
                            </template>
                        </ul>
                    </li>

                    <!-- Discounts -->
                    <li x-data="{ openMenu: false }" class="sidebarItem mt-3">
                        <a @click.prevent="openMenu = !openMenu" href="#" class="sidebarlink">
                            <i class="bi bi-percent me-2"></i>
                            <span x-text="t('nav.discounts')"></span>
                            <i class="ms-auto bi bi-chevron-down"></i>
                        </a>
                        <ul x-show="openMenu" x-transition class="submenu">
                            <template x-for="(item, i) in t('submenu')" :key="i">
                                <li class="submenu-item"><a href="#" x-text="item"></a></li>
                            </template>
                        </ul>
                    </li>

                    <!-- Ticket -->
                    <li class="sidebarItem mt-3">
                        <a href="#" class="sidebarlink">
                            <i class="bi bi-mastodon me-2"></i>
                            <span x-text="t('nav.tickets')"></span>
                        </a>
                    </li>

                    <!-- Comment -->
                    <li x-data="{ openMenu: false }" class="sidebarItem mt-3">
                        <a @click.prevent="openMenu = !openMenu" href="#" class="sidebarlink">
                            <i class="bi bi-chat-dots me-2"></i>
                            <span x-text="t('nav.comments')"></span>
                            <i class="ms-auto bi bi-chevron-down"></i>
                        </a>
                        <ul x-show="openMenu" x-transition class="submenu">
                            <template x-for="(item, i) in t('submenu')" :key="i">
                                <li class="submenu-item"><a href="#" x-text="item"></a></li>
                            </template>
                        </ul>
                    </li>

                </ul>
            </div>

        </aside>
        <!-- END SIDEBAR -->

        <!-- MAIN -->
        <main class="main" :class="{ 'active': open }">

            <!-- HEADER -->
            <header class="d-flex justify-content-between align-items-center p-2">
                <div>
                    <a href="#" class="text-dark">
                        <i @click="open = !open" class="bi bi-list fs-1"></i>
                    </a>
                </div>

                <div class="d-flex gap-4 align-items-center">

                    <!-- Language toggle -->
                    <button @click="toggleLang()" type="button"
                        class="btn btn-sm btn-outline-primary lang-toggle fw-bold"
                        x-text="t('langToggle')"></button>

                    <!-- Messages -->
                    <div class="dropdown">
                        <a class="dropdown-toggle text-dark" href="#" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-envelope fs-3 position-relative">
                                <span
                                    class="position-absolute top-0 start-50 translate-middle p-2 bg-danger border rounded-circle"></span>
                            </i>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </div>

                    <!-- Notifications -->
                    <div class="dropdown">
                        <a class="dropdown-toggle text-dark" href="#" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-bell fs-3"></i>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </div>

                    <!-- Profile -->
                    <div class="d-flex align-items-center">
                        <img src="./photo/fiqa.jpg" alt="" class="img-fluid rounded-circle profile-avatar"
                            onerror="this.src='https://i.pravatar.cc/100?img=47'"
                            style="width: 58px;">
                        <div class="ms-2">
                            <span class="fw-bold d-block" x-text="t('designer')"></span>
                            <span x-text="t('role')"></span>
                        </div>
                    </div>

                </div>
            </header>
            <!-- END HEADER -->

            <!-- CONTENT -->
            <div class="content">
                <div class="container-fluid">
                    <div class="row gy-4">

                        <!-- LEFT / MAIN COLUMN -->
                        <div class="col-xl-9">

                            <!-- STATS ROW -->
                            <div class="row g-3">

                                <!-- CARD 1 -->
                                <div class="col-6 col-xl-3">
                                    <div class="card">
                                        <div class="card-body">
                                            <div class="row align-items-center">
                                                <div class="col-md-4">
                                                    <div class="stats-icon bg-purple">
                                                        <i class="bi bi-eye-fill"></i>
                                                    </div>
                                                </div>
                                                <div class="col-md-8">
                                                    <h6 x-text="t('statsSeeProfile')"></h6>
                                                    <span class="fw-bold purecounter" data-purecounter-start="0"
                                                        data-purecounter-end="9341"></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- CARD 2 -->
                                <div class="col-6 col-xl-3">
                                    <div class="card">
                                        <div class="card-body">
                                            <div class="row align-items-center">
                                                <div class="col-md-4">
                                                    <div class="stats-icon bg-primary">
                                                        <i class="bi bi-person-fill"></i>
                                                    </div>
                                                </div>
                                                <div class="col-md-8">
                                                    <h6 x-text="t('statsNewUsers')"></h6>
                                                    <span class="fw-bold purecounter" data-purecounter-start="0"
                                                        data-purecounter-end="5520"></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- CARD 3 -->
                                <div class="col-6 col-xl-3">
                                    <div class="card">
                                        <div class="card-body">
                                            <div class="row align-items-center">
                                                <div class="col-md-4">
                                                    <div class="stats-icon bg-success">
                                                        <i class="bi bi-person-add"></i>
                                                    </div>
                                                </div>
                                                <div class="col-md-8">
                                                    <h6 x-text="t('statsSubscribers')"></h6>
                                                    <span class="fw-bold purecounter" data-purecounter-start="0"
                                                        data-purecounter-end="2045"></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- CARD 4 -->
                                <div class="col-6 col-xl-3">
                                    <div class="card">
                                        <div class="card-body">
                                            <div class="row align-items-center">
                                                <div class="col-md-4">
                                                    <div class="stats-icon bg-danger">
                                                        <i class="bi bi-bookmark-check-fill"></i>
                                                    </div>
                                                </div>
                                                <div class="col-md-8">
                                                    <h6 x-text="t('statsCompleted')"></h6>
                                                    <span class="fw-bold purecounter" data-purecounter-start="0"
                                                        data-purecounter-end="8890"></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div> <!-- end stats row -->

                            <!-- CHART 1 -->
                            <div class="row mt-4">
                                <div class="col-12">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5 class="fw-bold mb-0" x-text="t('chartHeader')"></h5>
                                        </div>
                                        <div class="card-body">
                                            <div id="chartdiv" style="height: 420px;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- PROGRESS & LAST COMMENTS -->
                            <div class="row mt-4">
                                <div class="col-xl-4">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5 class="fw-bold mb-0" x-text="t('progressTitle')"></h5>
                                        </div>
                                        <div class="card-body">

                                            <div class="progress">
                                                <div class="progress-bar bg-purple" role="progressbar"
                                                    style="width: 75%;" aria-valuenow="75" aria-valuemin="0"
                                                    aria-valuemax="100">75%</div>
                                            </div>
                                            <p class="text-muted mt-1" x-text="t('progressDesc')"></p>

                                            <div class="progress mt-3">
                                                <div class="progress-bar bg-primary" role="progressbar"
                                                    style="width: 45%;" aria-valuenow="45" aria-valuemin="0"
                                                    aria-valuemax="100">45%</div>
                                            </div>
                                            <p class="text-muted mt-1" x-text="t('progressDesc')"></p>

                                            <div class="progress mt-3">
                                                <div class="progress-bar bg-success" role="progressbar"
                                                    style="width: 35%;" aria-valuenow="35" aria-valuemin="0"
                                                    aria-valuemax="100">35%</div>
                                            </div>
                                            <p class="text-muted mt-1" x-text="t('progressDesc')"></p>

                                            <div class="progress mt-3">
                                                <div class="progress-bar bg-danger" role="progressbar"
                                                    style="width: 55%;" aria-valuenow="55" aria-valuemin="0"
                                                    aria-valuemax="100">55%</div>
                                            </div>
                                            <p class="text-muted mt-1" x-text="t('progressDesc')"></p>

                                        </div>
                                    </div>
                                </div>

                                <!-- LAST COMMENTS TABLE -->
                                <div class="col-xl-8">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5 class="fw-bold mb-0" x-text="t('lastComments')"></h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="table-responsive">
                                                <table class="table table-hover align-middle">
                                                    <thead>
                                                        <tr>
                                                            <th x-text="t('thPhoto')"></th>
                                                            <th x-text="t('thUser')"></th>
                                                            <th x-text="t('thComment')"></th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        <tr>
                                                            <td>
                                                                <img src="./photo/4.jpg"
                                                                    onerror="this.src='https://i.pravatar.cc/100?img=12'"
                                                                    class="img-fluid rounded-circle" style="width:50px;"
                                                                    alt="">
                                                            </td>
                                                            <td class="text-muted" x-text="t('profileName')"></td>
                                                            <td class="text-muted" x-text="t('commentText')"></td>
                                                        </tr>
                                                        <tr>
                                                            <td>
                                                                <img src="./photo/1.jpg"
                                                                    onerror="this.src='https://i.pravatar.cc/100?img=32'"
                                                                    class="img-fluid rounded-circle" style="width:50px;"
                                                                    alt="">
                                                            </td>
                                                            <td class="text-muted" x-text="t('profileName')"></td>
                                                            <td class="text-muted" x-text="t('commentText')"></td>
                                                        </tr>
                                                        <tr>
                                                            <td>
                                                                <img src="./photo/5.jpg"
                                                                    onerror="this.src='https://i.pravatar.cc/100?img=5'"
                                                                    class="img-fluid rounded-circle" style="width:50px;"
                                                                    alt="">
                                                            </td>
                                                            <td class="text-muted" x-text="t('profileName')"></td>
                                                            <td class="text-muted" x-text="t('commentText')"></td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div> <!-- END LEFT / MAIN COLUMN -->

                        <!-- RIGHT COLUMN -->
                        <div class="col-xl-3">

                            <!-- PROFILE -->
                            <div class="card">
                                <div class="card-body d-flex align-items-center">
                                    <img src="./photo/fiqa.jpg" class="img-fluid rounded-circle"
                                        onerror="this.src='https://i.pravatar.cc/100?img=47'"
                                        style="width:64px;" alt="">
                                    <div class="ms-2">
                                        <h6 class="fw-bold mb-0" x-text="t('profileName')"></h6>
                                        <p class="text-muted mb-2 small" x-text="t('profileHandle')"></p>
                                        <button class="btn btn-gray btn-sm" type="button"
                                            x-text="t('showUsers')"></button>
                                    </div>
                                </div>
                            </div>

                            <!-- DONUT CHART -->
                            <div class="card mt-3">
                                <div class="card-header">
                                    <h5 class="fw-bold mb-0" x-text="t('donutTitle')"></h5>
                                </div>
                                <div class="card-body">
                                    <div id="chartdiv2" style="height:280px;"></div>
                                </div>
                            </div>

                            <!-- SECONDARY PROGRESS CARD -->
                            <div class="card mt-3">
                                <div class="card-header">
                                    <h5 class="fw-bold mb-0" x-text="t('progressTitle')"></h5>
                                </div>
                                <div class="card-body">

                                    <div class="progress">
                                        <div class="progress-bar bg-purple" role="progressbar"
                                            style="width: 75%;" aria-valuenow="75" aria-valuemin="0"
                                            aria-valuemax="100">75%</div>
                                    </div>
                                    <p class="text-muted mt-1 small" x-text="t('progressDesc')"></p>

                                    <div class="progress mt-3">
                                        <div class="progress-bar bg-teal" role="progressbar"
                                            style="width: 55%;" aria-valuenow="55" aria-valuemin="0"
                                            aria-valuemax="100">55%</div>
                                    </div>
                                    <p class="text-muted mt-1 small" x-text="t('progressDesc')"></p>

                                    <div class="progress mt-3">
                                        <div class="progress-bar bg-coral" role="progressbar"
                                            style="width: 35%;" aria-valuenow="35" aria-valuemin="0"
                                            aria-valuemax="100">35%</div>
                                    </div>
                                    <p class="text-muted mt-1 small" x-text="t('progressDesc')"></p>

                                </div>
                            </div>

                        </div> <!-- END RIGHT COLUMN -->

                    </div> <!-- end row -->
                </div> <!-- end container -->
            </div> <!-- end content -->

        </main>
        <!-- END MAIN -->

    </section>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- PureCounter -->
    <script src="https://cdn.jsdelivr.net/npm/@srexi/purecounterjs/dist/purecounter_vanilla.js"></script>

    <!-- amCharts 5 core + modules + theme -->
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/xy.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/percent.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

    <!-- App scripts: alpine first so window.__t is ready when charts run -->
    <script src="./javascript/alpine.js"></script>
    <script src="./javascript/chart1.js"></script>
    <script src="./javascript/chartt2.js"></script>

    <script>new PureCounter();</script>

</body>

</html>
